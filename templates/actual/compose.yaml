x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/actual-budget.svg
  urls:
    - https://actualbudget.org/
    - https://github.com/actualbudget/actual-server

services:
  actual:
    image: docker.io/actualbudget/actual-server:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5006}:5006"
    environment:
      ACTUAL_PORT: 5006
      ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB: ${ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB:-20}
      ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB: ${ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB:-50}
      ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB: ${ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB:-20}
    volumes:
      - ${BASE_PATH}/data:/data
    healthcheck:
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/actual-budget.svg
