x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/calibre-web.svg
  urls:
    - https://github.com/janeczku/calibre-web
    - https://docs.linuxserver.io/images/docker-calibre-web/

services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8083}:8083"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${BASE_PATH}/config:/config
      - ${BOOKS_PATH}:/books
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/calibre-web.svg
